<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiFinex 專用熱門幣追蹤排行榜</title>
    <style>
        /* --- 全域質感設定 --- */
        :root {
            --bg-color: #0d1117;          /* 極深藍黑背景 */
            --card-bg: #161b22;           /* 卡片深灰背景 */
            --border-color: #30363d;       /* 精緻邊框顏色 */
            --text-main: #c9d1d9;         /* 主文字顏色 */
            --text-sub: #8b949e;          /* 次文字顏色 */
            --accent-blue: #58a6ff;       /* 亮藍色突顯 */
            --highlight: #21262d;         /* 滑鼠停留高亮 */
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- 頁首/標題區塊 --- */
        header {
            width: 100%;
            padding: 40px 0;
            text-align: center;
            background: radial-gradient(circle at center, #1f2937 0%, var(--bg-color) 70%);
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        h1 {
            color: white;
            margin: 0;
            font-size: 2.2em;
            letter-spacing: 1px;
            font-weight: 700;
        }
        
        h1::before {
            content: "📊 ";
            font-size: 0.9em;
        }

        /* --- 主內容區塊 --- */
        .container {
            width: 90%;
            max-width: 900px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden; /* 確保圓角效果 */
            margin-bottom: 60px; /* 給頁尾預留空間 */
        }

        /* 頂部功能列 */
        .tools-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background-color: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border-color);
        }

        .update-time {
            font-size: 0.9em;
            color: var(--text-sub);
        }

        .data-source {
            font-size: 0.85em;
            color: var(--text-sub);
            text-decoration: none;
            padding: 5px 10px;
            background: var(--highlight);
            border-radius: 20px;
            transition: color 0.2s;
        }
        .data-source:hover { color: var(--accent-blue); }

        /* --- 表格質感設計 --- */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1.05em;
        }

        th, td {
            padding: 20px 25px;
            text-align: left;
        }

        /* 表頭 */
        th {
            background-color: transparent;
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border-color);
        }

        /* 表格行 */
        tbody tr {
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody tr:hover {
            background-color: var(--highlight);
        }

        /* 排名數字 */
        .rank-num {
            font-weight: 800;
            font-size: 1.1em;
            color: white;
        }
        tr:nth-child(1) .rank-num { color: #ffd700; font-size: 1.3em; } /* 金 */
        tr:nth-child(2) .rank-num { color: #c0c0c0; font-size: 1.25em; } /* 銀 */
        tr:nth-child(3) .rank-num { color: #cd7f32; font-size: 1.2em; } /* 銅 */

        /* 幣種資訊 */
        .coin-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .coin-img-container {
            width: 38px;
            height: 38px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white; /* 確保不管什麼 logo 都有白底，更有質感 */
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(255,255,255,0.1);
            padding: 2px;
        }

        .coin-img {
            max-width: 90%;
            max-height: 90%;
        }

        .coin-name {
            font-weight: 600;
            color: white;
            font-size: 1.1em;
        }

        .coin-symbol {
            color: var(--text-sub);
            font-size: 0.9em;
            text-transform: uppercase;
            margin-left: 5px;
        }

        /* 市值排名與價格 */
        .mcap-rank {
            color: var(--accent-blue);
            font-family: 'Courier New', monospace; /* monospace 讓數字對齊更有序 */
            font-weight: bold;
        }

        .price {
            color: #d1d5db;
            font-weight: bold;
            font-size: 1.1em;
        }

        /* 載入與錯誤狀態 */
        .state-msg {
            text-align: center;
            padding: 50px;
            color: var(--accent-blue);
            font-size: 1.2em;
            font-weight: bold;
        }
        .error-msg { color: #ef4444; }

        /* --- 專屬頁尾 --- */
        footer {
            width: 100%;
            text-align: center;
            padding: 25px 0;
            background-color: var(--card-bg);
            border-top: 1px solid var(--border-color);
            position: fixed;
            bottom: 0;
            color: var(--text-sub);
            font-size: 0.95em;
            letter-spacing: 0.5px;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
        }

    </style>
</head>
<body>

    <header>
        <h1>DigiFinex 專用熱門幣追蹤排行榜</h1>
    </header>
    
    <div class="container">
        <div class="tools-bar">
            <div class="update-time" id="updateTime">正在初始化...</div>
            <a href="https://www.coingecko.com/" target="_blank" class="data-source">資料來源：CoinGecko API</a>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th style="width: 10%">熱度</th>
                    <th style="width: 45%">加密貨幣 (代號)</th>
                    <th style="width: 20%">市值排名</th>
                    <th style="width: 25%">目前價格 (USD)</th>
                </tr>
            </thead>
            <tbody id="cryptoTableBody">
                <tr>
                    <td colspan="4" class="state-msg">正在載入數據，請稍候...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <footer>
        DigiFinex Eddy小游製作
    </footer>

    <script>
        const API_URL = 'https://api.coingecko.com/api/v3/search/trending';

        async function fetchTrendingCrypto() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                renderTable(data.coins);
                
                const now = new Date();
                document.getElementById('updateTime').innerText = `最後同步：${now.toLocaleTimeString()}`;
            } catch (error) {
                console.error("Fetch error:", error);
                document.getElementById('cryptoTableBody').innerHTML = `
                    <tr><td colspan="4" class="state-msg error-msg">無法存取即時數據，可能受 API 頻率限制，請稍後重試。</td></tr>
                `;
            }
        }

        function renderTable(coins) {
            const tableBody = document.getElementById('cryptoTableBody');
            tableBody.innerHTML = ''; 

            coins.forEach((item, index) => {
                const coin = item.item;
                const price = coin.data && coin.data.price ? coin.data.price : '暫無報價';
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><span class="rank-num">${index + 1}</span></td>
                    <td>
                        <div class="coin-wrapper">
                            <div class="coin-img-container">
                                <img src="${coin.large}" alt="${coin.name}" class="coin-img">
                            </div>
                            <div>
                                <span class="coin-name">${coin.name}</span>
                                <span class="coin-symbol">${coin.symbol}</span>
                            </div>
                        </div>
                    </td>
                    <td><span class="mcap-rank">${coin.market_cap_rank ? '#' + coin.market_cap_rank : '未排名'}</span></td>
                    <td><span class="price">${price}</span></td>
                `;
                tableBody.appendChild(row);
            });
        }

        window.onload = fetchTrendingCrypto;
    </script>

</body>
</html>
