<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiFinex 專用熱門幣追蹤排行榜</title>
    <style>
        /* --- 全域質感設定 --- */
        :root {
            --bg-color: #0d1117;          
            --card-bg: #161b22;           
            --border-color: #30363d;       
            --text-main: #c9d1d9;         
            --text-sub: #8b949e;          
            --accent-blue: #58a6ff;       
            --highlight: #21262d;         
            --up-color: #10b981;          /* 漲跌幅：綠色 */
            --down-color: #ef4444;        /* 漲跌幅：紅色 */
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- 頁首/標題區塊 --- */
        header {
            width: 100%;
            padding: 40px 0;
            text-align: center;
            background: radial-gradient(circle at center, #1f2937 0%, var(--bg-color) 70%);
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        h1 {
            color: white;
            margin: 0;
            font-size: 2.2em;
            letter-spacing: 1px;
            font-weight: 700;
        }
        
        h1::before {
            content: "📊 ";
            font-size: 0.9em;
        }

        /* --- 主內容區塊 --- */
        .container {
            width: 95%;
            max-width: 1000px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden; 
            margin-bottom: 80px; 
        }

        /* 頂部功能列 (已隱藏資料來源) */
        .tools-bar {
            display: flex;
            justify-content: flex-end; /* 只留更新時間靠右 */
            align-items: center;
            padding: 15px 25px;
            background-color: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border-color);
        }

        .update-time {
            font-size: 0.9em;
            color: var(--text-sub);
        }

        /* --- 表格質感設計 --- */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1.05em;
        }

        th, td {
            padding: 18px 20px;
            text-align: left;
            white-space: nowrap; /* 防止文字折行 */
        }

        /* 表頭 */
        th {
            background-color: transparent;
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border-color);
        }

        /* 表格行 */
        tbody tr {
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody tr:hover {
            background-color: var(--highlight);
        }

        /* 排名數字 */
        .rank-num {
            font-weight: 800;
            font-size: 1.1em;
            color: white;
        }
        tr:nth-child(1) .rank-num { color: #ffd700; font-size: 1.3em; } 
        tr:nth-child(2) .rank-num { color: #c0c0c0; font-size: 1.25em; } 
        tr:nth-child(3) .rank-num { color: #cd7f32; font-size: 1.2em; } 

        /* 幣種資訊 */
        .coin-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .coin-img-container {
            width: 35px;
            height: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white; 
            border-radius: 50%;
            padding: 2px;
        }

        .coin-img {
            max-width: 90%;
            max-height: 90%;
        }

        .coin-name {
            font-weight: 600;
            color: white;
            font-size: 1.05em;
        }

        .coin-symbol {
            color: var(--text-sub);
            font-size: 0.85em;
            text-transform: uppercase;
            margin-left: 5px;
        }

        /* 價格與數據 */
        .price {
            color: white;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .volume {
            color: var(--text-main);
            font-family: 'Courier New', monospace;
        }

        .price-up {
            color: var(--up-color);
            font-weight: bold;
        }

        .price-down {
            color: var(--down-color);
            font-weight: bold;
        }

        /* 載入與錯誤狀態 */
        .state-msg {
            text-align: center;
            padding: 50px;
            color: var(--accent-blue);
            font-size: 1.2em;
            font-weight: bold;
        }

        /* --- 專屬頁尾 --- */
        footer {
            width: 100%;
            text-align: center;
            padding: 20px 0;
            background-color: var(--card-bg);
            border-top: 1px solid var(--border-color);
            position: fixed;
            bottom: 0;
            color: var(--text-sub);
            font-size: 0.95em;
            letter-spacing: 0.5px;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.4);
            z-index: 10;
        }
        
        /* 響應式設計：讓手機看也舒服 */
        @media (max-width: 768px) {
            th, td { padding: 15px 10px; font-size: 0.9em; }
            .volume-col { display: none; } /* 手機版空間有限，隱藏交易量 */
            .coin-name { display: block; }
            .coin-symbol { margin-left: 0; }
        }

    </style>
</head>
<body>

    <header>
        <h1>DigiFinex 專用熱門幣追蹤排行榜</h1>
    </header>
    
    <div class="container">
        <div class="tools-bar">
            <div class="update-time" id="updateTime">正在同步數據...</div>
        </div>
        
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th style="width: 8%">熱度</th>
                        <th style="width: 32%">加密貨幣</th>
                        <th style="width: 20%">價格 (USD)</th>
                        <th style="width: 15%">24H 漲跌幅</th>
                        <th style="width: 25%" class="volume-col">24H 交易量</th>
                    </tr>
                </thead>
                <tbody id="cryptoTableBody">
                    <tr>
                        <td colspan="5" class="state-msg">正在載入即時盤面數據...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer>
        DigiFinex Eddy小游製作
    </footer>

    <script>
        const API_URL = 'https://api.coingecko.com/api/v3/search/trending';

        async function fetchTrendingCrypto() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                renderTable(data.coins);
                
                const now = new Date();
                document.getElementById('updateTime').innerText = `最後更新：${now.toLocaleTimeString('zh-TW', { hour12: false })}`;
            } catch (error) {
                console.error("Fetch error:", error);
                document.getElementById('cryptoTableBody').innerHTML = `
                    <tr><td colspan="5" class="state-msg" style="color: #ef4444;">無法連線至報價伺服器，請稍後重新整理。</td></tr>
                `;
            }
        }

        function renderTable(coins) {
            const tableBody = document.getElementById('cryptoTableBody');
            tableBody.innerHTML = ''; 

            coins.forEach((item, index) => {
                const coin = item.item;
                
                // 處理價格
                const price = coin.data && coin.data.price ? coin.data.price : '暫無報價';
                
                // 處理 24H 交易量
                const volume24h = coin.data && coin.data.total_volume ? coin.data.total_volume : '-';

                // 處理 24H 漲跌幅 (判斷正負數來決定顏色與符號)
                let changeHtml = '<span style="color: #8b949e">-</span>';
                const changeValue = coin.data?.price_change_percentage_24h?.usd;
                
                if (changeValue !== undefined && changeValue !== null) {
                    const isPositive = changeValue >= 0;
                    const sign = isPositive ? '+' : '';
                    const colorClass = isPositive ? 'price-up' : 'price-down';
                    changeHtml = `<span class="${colorClass}">${sign}${changeValue.toFixed(2)}%</span>`;
                }
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><span class="rank-num">${index + 1}</span></td>
                    <td>
                        <div class="coin-wrapper">
                            <div class="coin-img-container">
                                <img src="${coin.large}" alt="${coin.name}" class="coin-img">
                            </div>
                            <div>
                                <span class="coin-name">${coin.name}</span>
                                <span class="coin-symbol">${coin.symbol}</span>
                            </div>
                        </div>
                    </td>
                    <td><span class="price">${price}</span></td>
                    <td>${changeHtml}</td>
                    <td class="volume-col"><span class="volume">${volume24h}</span></td>
                `;
                tableBody.appendChild(row);
            });
        }

        // 載入完成立即執行
        window.onload = fetchTrendingCrypto;
        
        // 設定每 60 秒自動刷新一次數據 (可選功能，讓它一直開著也會自動更新)
        setInterval(fetchTrendingCrypto, 60000); 
    </script>

</body>
</html>
