<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiFinex 專用熱門幣追蹤排行榜</title>
    <style>
        /* --- 全域質感與變數設定 --- */
        :root {
            --bg-color: #0b0e11;
            --card-bg: #161a1e;
            --border-color: #2b3139;
            --text-main: #eaecef;
            --text-sub: #848e9c;
            --highlight: #1e2329;
            --up-color: #0ecb81;
            --down-color: #f6465d;
            --accent-gold: #c99400;
            --sparkline-color: #00e6ff;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            margin: 0; padding: 0; display: flex; flex-direction: column;
            align-items: center; min-height: 100vh;
        }

        /* --- 頁首與新聞跑馬燈 --- */
        header {
            width: 100%; padding: 25px 0 15px 0; text-align: center;
        }

        h1 { color: white; margin: 0 0 15px 0; font-size: 2em; font-weight: 700; letter-spacing: 1px; }
        h1::before { content: "⚡ "; font-size: 0.9em; }

        .ticker-wrap {
            width: 100%; background: #000; padding: 10px 0; 
            border-top: 1px solid var(--accent-gold); border-bottom: 1px solid var(--accent-gold);
            overflow: hidden; white-space: nowrap; box-sizing: border-box;
            margin-bottom: 30px; box-shadow: 0 0 10px rgba(201, 148, 0, 0.2);
        }
        
        .ticker-content {
            display: inline-block; padding-left: 100%;
            /* 【已修改】放慢到 180 秒，正常人類閱讀速度 */
            animation: ticker 180s linear infinite; 
        }
        
        .ticker-content:hover { animation-play-state: paused; } /* 滑鼠停留在新聞上會暫停 */

        .ticker-item { display: inline-block; padding: 0 2rem; color: #c9d1d9; font-family: 'Courier New', monospace; font-size: 0.95em; }
        .ticker-source { color: var(--accent-gold); font-weight: bold; margin-right: 8px; }
        .ticker-time { color: var(--text-sub); font-size: 0.85em; margin-right: 8px; }
        .ticker-link { color: inherit; text-decoration: none; transition: color 0.2s; }
        .ticker-link:hover { color: white; text-decoration: underline; }

        @keyframes ticker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* --- 主內容區塊 --- */
        .main-content {
            width: 95%; max-width: 1200px; margin-bottom: 80px;
            display: flex; flex-direction: column; gap: 30px;
        }

        .data-card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .card-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 25px; border-bottom: 1px solid var(--border-color);
        }

        .card-title { font-size: 1.4em; font-weight: 600; color: white; margin: 0; }
        .update-time { font-size: 0.85em; color: var(--text-sub); }
        
        .ws-status-container { display: flex; align-items: center; gap: 10px; }
        .live-indicator { color: var(--up-color); font-weight: bold; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* --- 表格設計 --- */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 1.05em; min-width: 900px; }
        th, td { padding: 18px 20px; text-align: left; vertical-align: middle; white-space: nowrap; }
        th { color: var(--text-sub); font-weight: 500; text-transform: uppercase; font-size: 0.85em; border-bottom: 1px solid var(--border-color); }
        tbody tr { border-bottom: 1px solid var(--border-color); transition: background-color 0.2s; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background-color: var(--highlight); }

        .rank-num { font-weight: 800; font-size: 1.1em; color: white; }
        tr:nth-child(1) .rank-num { color: #ffd700; font-size: 1.3em; } 
        tr:nth-child(2) .rank-num { color: #c0c0c0; font-size: 1.25em; } 
        tr:nth-child(3) .rank-num { color: #cd7f32; font-size: 1.2em; } 

        .coin-wrapper { display: flex; align-items: center; gap: 12px; }
        .coin-img-container { width: 32px; height: 32px; display: flex; justify-content: center; align-items: center; background-color: white; border-radius: 50%; padding: 2px; }
        .coin-img { max-width: 90%; max-height: 90%; }
        .coin-name { font-weight: 600; color: white; }
        .coin-symbol { color: var(--text-sub); font-size: 0.85em; text-transform: uppercase; margin-left: 5px; }

        .live-price-container {
            font-family: 'Courier New', monospace; color: white; font-weight: bold; font-size: 1.1em;
            display: inline-block; padding: 4px 8px; border-radius: 4px; transition: background-color 0.3s, color 0.3s;
        }
        .flash-up { background-color: rgba(14, 203, 129, 0.25); color: var(--up-color); }
        .flash-down { background-color: rgba(246, 70, 93, 0.25); color: var(--down-color); }

        .data-text { color: var(--text-main); font-family: 'Courier New', monospace; font-size: 0.95em; }
        .price-up { color: var(--up-color); font-weight: bold; }
        .price-down { color: var(--down-color); font-weight: bold; }

        .sparkline-img { width: 110px; height: 38px; filter: brightness(0) invert(1) drop-shadow(0 0 3px var(--sparkline-color)) drop-shadow(0 0 1px var(--sparkline-color)); }
        .state-msg { text-align: center; padding: 50px; color: var(--accent-gold); font-size: 1.1em; font-weight: 500; }

        footer {
            width: 100%; text-align: center; padding: 18px 0; background-color: var(--card-bg); 
            border-top: 1px solid var(--border-color); position: fixed; bottom: 0; color: var(--text-sub);
            font-size: 0.9em; z-index: 10;
        }
    </style>
</head>
<body>

    <header>
        <h1>DigiFinex 專用熱門幣追蹤排行榜</h1>
        <div class="ticker-wrap">
            <div class="ticker-content" id="newsTicker">
                <span class="ticker-item">正在連接全球新聞資料庫...</span>
            </div>
        </div>
    </header>
    
    <div class="main-content">
        <div class="data-card">
            <div class="card-header">
                <h2 class="card-title">🔥 今日最熱門加密貨幣</h2>
                <div class="ws-status-container">
                    <div class="update-time" id="wsStatus">正在同步鏈上數據...</div>
                    <span class="live-indicator">● LIVE</span>
                </div>
            </div>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 5%">熱度</th>
                            <th style="width: 30%">加密貨幣</th>
                            <th style="width: 18%">極速價格 (USDT)</th>
                            <th style="width: 15%">24H 漲跌</th>
                            <th style="width: 20%">24H 交易量</th>
                            <th style="width: 12%">7天走勢</th>
                        </tr>
                    </thead>
                    <tbody id="cryptoTableBody">
                        <tr><td colspan="6" class="state-msg">正在載入即時盤面報價...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="data-card">
            <div class="card-header">
                <h2 class="card-title">🚀 熱門生態板塊 (Top 6)</h2>
                <div class="update-time" id="categoryUpdateTime">正在分析資金流向...</div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 10%">排行</th>
                            <th style="width: 60%">生態板塊 (Sector)</th>
                            <th style="width: 30%">24H 總市值漲跌</th>
                        </tr>
                    </thead>
                    <tbody id="categoryTableBody">
                        <tr><td colspan="3" class="state-msg">正在計算板塊權重...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer>DigiFinex Eddy小游製作</footer>

    <script>
        const CG_API_URL = 'https://api.coingecko.com/api/v3/search/trending';
        const NEWS_API_URL = 'https://api.rss2json.com/v1/api.json?rss_url=https://cointelegraph.com/rss'; 
        let binanceWs = null;
        const previousPrices = {};

        function getNowTime() { return new Date().toLocaleTimeString('zh-TW', { hour12: false }); }

        function formatNumber(num) {
            return parseFloat(num).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 6 });
        }

        function formatChange(value) {
            if (value === undefined || value === null) return '<span style="color: #848e9c">-</span>';
            const isPos = value >= 0;
            return `<span class="${isPos ? 'price-up' : 'price-down'}">${isPos ? '+' : ''}${value.toFixed(2)}%</span>`;
        }

        // --- 1. 抓取即時新聞 ---
        async function fetchNews() {
            try {
                const res = await fetch(NEWS_API_URL);
                if (!res.ok) throw new Error('Network response was not ok');
                const json = await res.json();
                
                if (!json.items || json.items.length === 0) throw new Error('No news items found');
                
                const newsData = json.items.slice(0, 15); 
                
                const tickerElement = document.getElementById('newsTicker');
                tickerElement.innerHTML = ''; 

                newsData.forEach(news => {
                    const date = new Date(news.pubDate.replace(/-/g, '/'));
                    const timeStr = isNaN(date.getTime()) ? '最新' : date.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false });
                    
                    const span = document.createElement('span');
                    span.className = 'ticker-item';
                    span.innerHTML = `
                        <span class="ticker-time">[${timeStr}]</span>
                        <span class="ticker-source">CoinTelegraph :</span>
                        <a href="${news.link}" target="_blank" class="ticker-link">${news.title}</a>
                    `;
                    tickerElement.appendChild(span);
                });
            } catch (err) {
                console.error("News fetch error:", err);
                document.getElementById('newsTicker').innerHTML = '<span class="ticker-item" style="color:#f6465d;">⚠️ 無法載入最新新聞，請檢查網路連線或稍後重試。</span>';
            }
        }

        // --- 2. 抓取 CoinGecko 熱門數據 ---
        async function initDashboard() {
            try {
                const response = await fetch(CG_API_URL);
                const data = await response.json();
                
                renderCoinsTable(data.coins);
                renderCategoriesTable(data.categories);
                document.getElementById('categoryUpdateTime').innerText = `最後分析：${getNowTime()}`;

                connectBinanceWebSocket(data.coins);
            } catch (error) {
                document.getElementById('cryptoTableBody').innerHTML = '<tr><td colspan="6" class="state-msg" style="color: #f6465d;">數據同步失敗，請稍後重試。</td></tr>';
            }
        }

        function renderCoinsTable(coins) {
            const tableBody = document.getElementById('cryptoTableBody');
            tableBody.innerHTML = ''; 

            coins.forEach((item, index) => {
                const coin = item.item;
                const symbol = coin.symbol.toUpperCase();
                const priceDisplay = coin.data?.price ? coin.data.price : '載入中...';
                const sparklineHtml = coin.data?.sparkline ? `<img src="${coin.data.sparkline}" class="sparkline-img" alt="trend">` : '<span style="color:#555">無圖表</span>';
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><span class="rank-num">${index + 1}</span></td>
                    <td>
                        <div class="coin-wrapper">
                            <div class="coin-img-container"><img src="${coin.large}" class="coin-img"></div>
                            <div>
                                <span class="coin-name">${coin.name}</span>
                                <span class="coin-symbol">${symbol}</span>
                            </div>
                        </div>
                    </td>
                    <td><span class="live-price-container" id="price-${symbol}">${priceDisplay}</span></td>
                    <td>${formatChange(coin.data?.price_change_percentage_24h?.usd)}</td>
                    <td><span class="data-text">${coin.data?.total_volume || '-'}</span></td>
                    <td>${sparklineHtml}</td>
                `;
                tableBody.appendChild(row);
            });
        }

        function renderCategoriesTable(categories) {
            const tableBody = document.getElementById('categoryTableBody');
            tableBody.innerHTML = '';
            categories.forEach((cat, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><span class="rank-num">${index + 1}</span></td>
                    <td><span style="font-weight: 600; color: white; font-size: 1.1em;">${cat.name}</span></td>
                    <td>${formatChange(cat.data?.market_cap_change_percentage_24h?.usd)}</td>
                `;
                tableBody.appendChild(row);
            });
        }

        // --- 3. Binance WebSocket 報價 ---
        function connectBinanceWebSocket(coins) {
            if (binanceWs) binanceWs.close();

            const streams = coins.map(item => `${item.item.symbol.toLowerCase()}usdt@ticker`).join('/');
            const wsUrl = `wss://stream.binance.com:9443/stream?streams=${streams}`;

            binanceWs = new WebSocket(wsUrl);

            binanceWs.onopen = () => { document.getElementById('wsStatus').innerText = '🟢 幣安極速報價連線中'; };

            binanceWs.onmessage = (event) => {
                const message = JSON.parse(event.data);
                const symbol = message.stream.split('usdt')[0].toUpperCase();
                const newPrice = parseFloat(message.data.c);
                updateLivePriceUI(symbol, newPrice);
            };
            
            binanceWs.onerror = () => { document.getElementById('wsStatus').innerText = '🔴 報價連線中斷'; };
        }

        function updateLivePriceUI(symbol, newPrice) {
            const priceElement = document.getElementById(`price-${symbol}`);
            if (!priceElement) return;

            const oldPrice = previousPrices[symbol] || newPrice;
            const formattedPrice = '$' + formatNumber(newPrice);
            
            if (newPrice !== oldPrice) {
                priceElement.innerText = formattedPrice;
                if (newPrice > oldPrice) {
                    priceElement.classList.add('flash-up');
                    priceElement.classList.remove('flash-down');
                } else {
                    priceElement.classList.add('flash-down');
                    priceElement.classList.remove('flash-up');
                }
                setTimeout(() => { priceElement.classList.remove('flash-up', 'flash-down'); }, 350);
            } else if (!previousPrices[symbol]) {
                priceElement.innerText = formattedPrice;
            }
            previousPrices[symbol] = newPrice;
        }

        // 啟動所有功能
        window.onload = () => {
            initDashboard();
            fetchNews(); // 啟動新聞跑馬燈
        };
        
        // 每 60 秒刷新一次排名與新聞
        setInterval(() => {
            initDashboard();
            fetchNews();
        }, 60000); 
    </script>
</body>
</html>
